<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIRE Explorer">
<meta name="theme-color" content="#0d0d0d">
<title>FIRE Scenario Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0d0d0d; overflow-x: hidden; padding-top: env(safe-area-inset-top); }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: #333; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid #555; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine, CartesianGrid } = Recharts;

const DEFAULT_PORTFOLIO = 716000;

function projectPortfolio(startBalance, monthlyContrib, annualReturn, years, contribYears) {
  const monthlyRate = annualReturn / 12;
  const totalMonths = years * 12;
  const contribMonths = contribYears !== null ? contribYears * 12 : totalMonths;
  const data = [];
  let balance = startBalance;
  for (let m = 0; m <= totalMonths; m++) {
    if (m % 12 === 0) {
      const year = m / 12;
      const fourPctIncome = balance * 0.04;
      const totalContributed = Math.min(m, contribMonths) * monthlyContrib;
      data.push({
        year,
        label: "Year " + year,
        balance: Math.round(balance),
        fourPctIncome: Math.round(fourPctIncome),
        fourPctMonthly: Math.round(fourPctIncome / 12),
        totalContributed: Math.round(totalContributed + startBalance),
        gains: Math.round(balance - totalContributed - startBalance),
      });
    }
    if (m < totalMonths) {
      const contrib = m < contribMonths ? monthlyContrib : 0;
      balance = (balance + contrib) * (1 + monthlyRate);
    }
  }
  return data;
}

const formatDollar = (v) => {
  if (v >= 1000000) return "$" + (v / 1000000).toFixed(1) + "M";
  if (v >= 1000) return "$" + (v / 1000).toFixed(0) + "k";
  return "$" + v;
};

const baseScenarios = [
  { id: "full", labelFn: (y) => "$8k/mo \u00b7 " + y + " years", monthly: 8000, contribYears: null, color: "#2563eb" },
  { id: "three", labelFn: (y) => "$8k/mo \u00b7 3yr then stop", monthly: 8000, contribYears: 3, color: "#7c3aed" },
  { id: "half", labelFn: (y) => "$4k/mo \u00b7 " + y + " years", monthly: 4000, contribYears: null, color: "#0891b2" },
  { id: "zero", labelFn: (y) => "$0/mo \u00b7 let it ride", monthly: 0, contribYears: null, color: "#dc2626" },
];

function CustomTooltip({ active, payload, label }) {
  if (!active || !payload || payload.length === 0) return null;
  return (
    <div style={{
      background: "#1a1a1a", border: "1px solid #333", borderRadius: 8,
      padding: "14px 18px", fontFamily: "'DM Sans', sans-serif", fontSize: 13,
      color: "#e5e5e5", minWidth: 200,
    }}>
      <div style={{ fontWeight: 700, marginBottom: 10, color: "#fff", fontSize: 14 }}>{label}</div>
      {payload.map(function(entry, i) {
        return (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, gap: 20 }}>
            <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: entry.color, display: "inline-block" }} />
              <span style={{ color: "#aaa", fontSize: 12 }}>{entry.name}</span>
            </span>
            <span style={{ fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{formatDollar(entry.value)}</span>
          </div>
        );
      })}
    </div>
  );
}

function FireScenarios() {
  const [annualReturn, setAnnualReturn] = useState(7);
  const [startingBalance, setStartingBalance] = useState(DEFAULT_PORTFOLIO);
  const [activeScenarios, setActiveScenarios] = useState(new Set(["full", "three", "half", "zero"]));
  const [selectedDetail, setSelectedDetail] = useState("three");
  const [customMonthly, setCustomMonthly] = useState(6000);
  const [customContribYears, setCustomContribYears] = useState(5);
  const [showCustom, setShowCustom] = useState(false);
  const [years, setYears] = useState(20);

  const scenarios = useMemo(function() {
    return baseScenarios.map(function(s) { return Object.assign({}, s, { label: s.labelFn(years) }); });
  }, [years]);

  const allData = useMemo(function() {
    var results = {};
    scenarios.forEach(function(s) {
      results[s.id] = projectPortfolio(startingBalance, s.monthly, annualReturn / 100, years, s.contribYears);
    });
    if (showCustom) {
      results.custom = projectPortfolio(startingBalance, customMonthly, annualReturn / 100, years, customContribYears);
    }
    return results;
  }, [annualReturn, showCustom, customMonthly, customContribYears, years, scenarios, startingBalance]);

  const chartData = useMemo(function() {
    var merged = [];
    for (var y = 0; y <= years; y++) {
      var point = { year: y, label: "Year " + y };
      scenarios.forEach(function(s) {
        if (activeScenarios.has(s.id) && allData[s.id] && allData[s.id][y]) {
          point[s.id] = allData[s.id][y].balance;
        }
      });
      if (showCustom && allData.custom && allData.custom[y]) {
        point.custom = allData.custom[y].balance;
      }
      merged.push(point);
    }
    return merged;
  }, [allData, activeScenarios, showCustom, years]);

  var detailKey = showCustom ? "custom" : selectedDetail;
  var detailData = allData[detailKey] || allData["three"] || [];
  var detailScenario = showCustom
    ? { label: "$" + (customMonthly/1000).toFixed(0) + "k/mo \u00b7 " + customContribYears + " years", color: "#f59e0b" }
    : scenarios.find(function(s) { return s.id === selectedDetail; }) || scenarios[0];

  function toggleScenario(id) {
    setActiveScenarios(function(prev) {
      var next = new Set(prev);
      if (next.has(id)) { next.delete(id); } else { next.add(id); }
      return next;
    });
  }

  function sliderBlock(label, value, displayValue, min, max, step, onChange, hints) {
    return (
      <div style={{ background: "#161616", borderRadius: 12, padding: "16px 20px", marginBottom: 16, border: "1px solid #222" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 13, color: "#999" }}>{label}</span>
          <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 16, fontWeight: 600, color: "#fff" }}>{displayValue}</span>
        </div>
        <input type="range" min={min} max={max} step={step} value={value} onChange={onChange} style={{ width: "100%", accentColor: "#2563eb" }} />
        {hints && (
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#555", marginTop: 4, fontFamily: "'DM Mono', monospace" }}>
            {hints.map(function(h, i) { return <span key={i}>{h}</span>; })}
          </div>
        )}
      </div>
    );
  }

  var lastYearData = function(id) {
    return allData[id] && allData[id][years] ? allData[id][years].balance : 0;
  };

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#0d0d0d", color: "#e5e5e5", minHeight: "100vh", padding: "40px 20px 60px" }}>
      <div style={{ maxWidth: 860, margin: "0 auto" }}>
        <div style={{ marginBottom: 32 }}>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", color: "#666", textTransform: "uppercase", marginBottom: 8, fontFamily: "'DM Mono', monospace" }}>Portfolio Forecast</div>
          <h1 style={{ fontSize: 26, fontWeight: 700, color: "#fff", margin: 0, lineHeight: 1.2 }}>FIRE Scenario Explorer</h1>
          <p style={{ color: "#777", fontSize: 14, marginTop: 8, lineHeight: 1.5 }}>
            Starting balance: <span style={{ color: "#fff", fontWeight: 600 }}>{formatDollar(startingBalance)}</span>
            {" \u00b7 "}Assumes <span style={{ color: "#fff", fontWeight: 600 }}>{annualReturn}%</span> annualized return
          </p>
        </div>

        {sliderBlock("Starting Balance", startingBalance, formatDollar(startingBalance), 0, 2000000, 10000, function(e) { setStartingBalance(parseInt(e.target.value)); }, ["$0", "$1M", "$2M"])}
        {sliderBlock("Annual Return Assumption", annualReturn, annualReturn + "%", 4, 12, 0.5, function(e) { setAnnualReturn(parseFloat(e.target.value)); }, ["4% conservative", "7% historical avg", "12% aggressive"])}
        {sliderBlock("Time Horizon", years, years + " years", 5, 30, 1, function(e) { setYears(parseInt(e.target.value)); }, ["5 years", "15 years", "30 years"])}

        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10, marginBottom: 20 }}>
          {scenarios.map(function(s) {
            var active = activeScenarios.has(s.id);
            var isDetail = selectedDetail === s.id && !showCustom;
            var finalBal = lastYearData(s.id);
            return (
              <button key={s.id} onClick={function() { toggleScenario(s.id); if (!showCustom) setSelectedDetail(s.id); }}
                style={{ background: active ? "#1a1a1a" : "#111", border: "1px solid " + (isDetail ? s.color : active ? "#333" : "#1a1a1a"),
                  borderRadius: 10, padding: "14px 14px", cursor: "pointer", textAlign: "left", opacity: active ? 1 : 0.4, transition: "all 0.2s" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <span style={{ width: 10, height: 10, borderRadius: "50%", background: s.color, display: "inline-block", flexShrink: 0 }} />
                  <span style={{ fontSize: 11, color: "#aaa", fontWeight: 500 }}>{s.label}</span>
                </div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", fontFamily: "'DM Mono', monospace" }}>{formatDollar(finalBal)}</div>
                <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>at year {years} {"\u00b7"} {formatDollar(finalBal * 0.04)}/yr</div>
              </button>
            );
          })}
        </div>

        <div style={{ background: "#161616", borderRadius: 12, border: "1px solid " + (showCustom ? "#f59e0b" : "#222"), padding: "16px 20px", marginBottom: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showCustom ? 16 : 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#f59e0b", display: "inline-block" }} />
              <span style={{ fontSize: 13, fontWeight: 600, color: "#e5e5e5" }}>Custom Scenario</span>
            </div>
            <button onClick={function() { setShowCustom(!showCustom); }}
              style={{ background: showCustom ? "#f59e0b" : "#333", color: showCustom ? "#000" : "#aaa", border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              {showCustom ? "ON" : "OFF"}
            </button>
          </div>
          {showCustom && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ fontSize: 12, color: "#888" }}>Monthly</span>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 14, fontWeight: 600, color: "#f59e0b" }}>${customMonthly.toLocaleString()}</span>
                </div>
                <input type="range" min={0} max={25000} step={500} value={customMonthly} onChange={function(e) { setCustomMonthly(parseInt(e.target.value)); }} style={{ width: "100%", accentColor: "#f59e0b" }} />
              </div>
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ fontSize: 12, color: "#888" }}>Contribute for</span>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 14, fontWeight: 600, color: "#f59e0b" }}>{customContribYears} years</span>
                </div>
                <input type="range" min={0} max={years} step={1} value={Math.min(customContribYears, years)} onChange={function(e) { setCustomContribYears(parseInt(e.target.value)); }} style={{ width: "100%", accentColor: "#f59e0b" }} />
              </div>
              {allData.custom && allData.custom[years] && (
                <div style={{ gridColumn: "1 / -1", paddingTop: 8, borderTop: "1px solid #282828" }}>
                  <span style={{ fontSize: 13, color: "#888" }}>Year {years} balance: </span>
                  <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 18, fontWeight: 700, color: "#fff" }}>{formatDollar(allData.custom[years].balance)}</span>
                  <span style={{ fontSize: 13, color: "#666", marginLeft: 12 }}>{"\u2192"} {formatDollar(allData.custom[years].balance * 0.04)}/yr at 4%</span>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{ background: "#131313", borderRadius: 14, padding: "20px 8px 8px 0", marginBottom: 24, border: "1px solid #1e1e1e" }}>
          <ResponsiveContainer width="100%" height={320}>
            <AreaChart data={chartData} margin={{ top: 10, right: 16, bottom: 10, left: 10 }}>
              <defs>
                {scenarios.map(function(s) {
                  return (
                    <linearGradient key={s.id} id={"grad-" + s.id} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={s.color} stopOpacity={0.15} />
                      <stop offset="100%" stopColor={s.color} stopOpacity={0} />
                    </linearGradient>
                  );
                })}
                <linearGradient id="grad-custom" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#f59e0b" stopOpacity={0.15} />
                  <stop offset="100%" stopColor="#f59e0b" stopOpacity={0} />
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e1e1e" />
              <XAxis dataKey="year" tick={{ fill: "#555", fontSize: 11 }} axisLine={{ stroke: "#222" }} tickLine={false} tickFormatter={function(v) { return "Yr " + v; }} />
              <YAxis tick={{ fill: "#555", fontSize: 11 }} axisLine={false} tickLine={false} tickFormatter={formatDollar} width={50} />
              <Tooltip content={<CustomTooltip />} />
              <ReferenceLine y={1000000} stroke="#333" strokeDasharray="6 4" label={{ value: "$1M", fill: "#444", fontSize: 11, position: "right" }} />
              {scenarios.filter(function(s) { return activeScenarios.has(s.id); }).map(function(s) {
                return (
                  <Area key={s.id} type="monotone" dataKey={s.id} stroke={s.color} fill={"url(#grad-" + s.id + ")"} strokeWidth={selectedDetail === s.id && !showCustom ? 2.5 : 1.5} dot={false} name={s.label} opacity={selectedDetail === s.id || showCustom ? 1 : 0.6} />
                );
              })}
              {showCustom && (
                <Area type="monotone" dataKey="custom" stroke="#f59e0b" fill="url(#grad-custom)" strokeWidth={2.5} dot={false} name={"$" + (customMonthly/1000).toFixed(0) + "k/mo \u00b7 " + customContribYears + "yr"} strokeDasharray="6 3" />
              )}
            </AreaChart>
          </ResponsiveContainer>
        </div>

        <div style={{ background: "#131313", borderRadius: 14, padding: 16, border: "1px solid #1e1e1e", marginBottom: 24 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#999", marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 8, height: 8, borderRadius: "50%", background: detailScenario.color }} />
            Year-by-year: {detailScenario.label}
          </div>
          <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "'DM Mono', monospace", fontSize: 12, minWidth: 500 }}>
              <thead>
                <tr style={{ borderBottom: "1px solid #222" }}>
                  {["Year", "Balance", "4% Annual", "4% Monthly", "Contributed", "Growth"].map(function(h) {
                    return <th key={h} style={{ padding: "8px 10px", textAlign: "right", color: "#555", fontWeight: 500, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.05em" }}>{h}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {detailData.map(function(row, i) {
                  return (
                    <tr key={i} style={{ borderBottom: "1px solid #1a1a1a", background: row.year === 3 ? "rgba(255,255,255,0.02)" : "transparent" }}>
                      <td style={{ padding: "9px 10px", textAlign: "right", color: "#888" }}>{row.year}</td>
                      <td style={{ padding: "9px 10px", textAlign: "right", color: "#fff", fontWeight: 600 }}>{formatDollar(row.balance)}</td>
                      <td style={{ padding: "9px 10px", textAlign: "right", color: "#4ade80" }}>{formatDollar(row.fourPctIncome)}</td>
                      <td style={{ padding: "9px 10px", textAlign: "right", color: "#4ade80" }}>{formatDollar(row.fourPctMonthly)}</td>
                      <td style={{ padding: "9px 10px", textAlign: "right", color: "#888" }}>{formatDollar(row.totalContributed)}</td>
                      <td style={{ padding: "9px 10px", textAlign: "right", color: row.gains >= 0 ? "#2563eb" : "#dc2626" }}>{formatDollar(row.gains)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        <div style={{ background: "#161616", borderRadius: 12, padding: 16, border: "1px solid #222", marginBottom: 40 }}>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", color: "#666", textTransform: "uppercase", marginBottom: 12, fontFamily: "'DM Mono', monospace" }}>Quick Reference {"\u00b7"} 4% Rule</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10 }}>
            {[
              { target: "$40k/yr", need: "$1.0M", monthly: "$3,333/mo" },
              { target: "$48k/yr", need: "$1.2M", monthly: "$4,000/mo" },
              { target: "$60k/yr", need: "$1.5M", monthly: "$5,000/mo" },
              { target: "$80k/yr", need: "$2.0M", monthly: "$6,667/mo" },
            ].map(function(r) {
              return (
                <div key={r.target} style={{ background: "#111", borderRadius: 8, padding: "12px 14px", textAlign: "center" }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#4ade80" }}>{r.target}</div>
                  <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>needs {r.need}</div>
                  <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{r.monthly}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FireScenarios />);
</script>
</body>
</html>
